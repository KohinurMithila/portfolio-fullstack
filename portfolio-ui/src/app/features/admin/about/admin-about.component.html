<h2 class="admin-title">About Me</h2>

<form class="admin-form" (ngSubmit)="submit()">
    <div>
        <label>Full Name</label>
        <input [(ngModel)]="form.name" name="name" placeholder="John Doe" required>
    </div>
    
    <!-- Studies Array -->
    <div>
        <label>Educational Qualifications (Studies)</label>
        <div *ngFor="let study of form.studies; let i = index; trackBy: trackByIndex" style="display: flex; gap: 10px; margin-bottom: 10px;">
            <input [(ngModel)]="form.studies[i]" [name]="'study_' + i" placeholder="E.g., BSc in Computer Science, Harvard University" style="flex: 1;">
            <button class="btn-danger" type="button" (click)="removeStudy(i)">Remove</button>
        </div>
        <button class="btn-secondary mt-4" type="button" (click)="addStudy()">+ Add Study</button>
    </div>

    <div>
        <label>WhatsApp Number</label>
        <input [(ngModel)]="form.whatsapp" name="whatsapp" placeholder="+1234567890">
    </div>

    <div>
        <label>Email Address</label>
        <input [(ngModel)]="form.email" name="email" placeholder="hello@johndoe.com">
    </div>

    <div>
        <label>Physical Address</label>
        <input [(ngModel)]="form.address" name="address" placeholder="123 Street, City, Country">
    </div>

    <div>
        <label>LinkedIn Profile URL</label>
        <input [(ngModel)]="form.linkedInUrl" name="linkedInUrl" placeholder="https://linkedin.com/in/johndoe">
    </div>

    <div>
        <label>GitHub Profile URL</label>
        <input [(ngModel)]="form.githubUrl" name="githubUrl" placeholder="https://github.com/johndoe">
    </div>

    <div>
        <label>Profile Image</label>
        <div style="display: flex; gap: 16px; align-items: center;">
            <div style="flex: 1;">
                <input type="file" (change)="onImageSelected($event)" accept="image/*" style="padding: 9px 12px; cursor: pointer;">
            </div>
            <span style="color: var(--text-muted); font-weight: 500; font-size: 14px;">OR</span>
            <div style="flex: 2;">
                <input [(ngModel)]="form.imageUrl" name="imageUrl" placeholder="Direct URL to Image file">
            </div>
        </div>
    </div>
    
    <div>
        <label>CV Document</label>
        <div style="display: flex; gap: 16px; align-items: center;">
            <div style="flex: 1;">
                <input type="file" (change)="onFileSelected($event)" accept=".pdf,.doc,.docx" style="padding: 9px 12px; cursor: pointer;">
            </div>
            <span style="color: var(--text-muted); font-weight: 500; font-size: 14px;">OR</span>
            <div style="flex: 2;">
                <input [(ngModel)]="form.cvUrl" name="cvUrl" placeholder="Direct URL to CV file">
            </div>
        </div>
    </div>

    <button class="btn-primary" type="submit" style="align-self: flex-start; margin-top: 10px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        Save Changes
    </button>
</form>
