<h2 class="admin-title">Manage Experience</h2>

<form class="admin-form" (ngSubmit)="submit()">
    <div style="display: flex; gap: 16px;">
        <div style="flex: 1;">
            <label>Company Name</label>
            <input [(ngModel)]="form.companyName" name="companyName" placeholder="E.g. Google, Microsoft">
        </div>
        <div style="flex: 1;">
            <label>Role / Position</label>
            <input [(ngModel)]="form.role" name="role" placeholder="E.g. Senior Software Engineer">
        </div>
    </div>

    <div>
        <label>Description & Achievements</label>
        <textarea [(ngModel)]="form.description" name="description" placeholder="Describe your responsibilities and achievements..." rows="3"></textarea>
    </div>

    <div style="display: flex; gap: 16px;">
        <div style="flex: 1;">
            <label>Start Date</label>
            <input [(ngModel)]="form.startDate" name="startDate" type="date">
        </div>
        <div style="flex: 1;">
            <label>End Date</label>
            <input [(ngModel)]="form.endDate" name="endDate" type="date">
        </div>
    </div>

    <button class="btn-primary" type="submit" style="align-self: flex-start; margin-top: 8px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Save Experience
    </button>
</form>

<div class="admin-list mt-4">
    <div class="admin-card" *ngFor="let e of experiences">
        <h3 style="color: var(--primary); margin-bottom: 4px;">{{e.role}}</h3>
        <p style="font-weight: 600; font-size: 16px; color: #fff; margin-bottom: 8px;">{{e.companyName}}</p>
        
        <div style="font-size: 12px; color: var(--accent); margin-bottom: 12px; font-weight: 500;">
            {{e.startDate | date:'mediumDate'}} - <span *ngIf="e.endDate">{{e.endDate | date:'mediumDate'}}</span><span *ngIf="!e.endDate">Present</span>
        </div>

        <p style="overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical;">
            {{e.description}}
        </p>

        <div class="admin-card-actions">
            <button class="btn-secondary" (click)="edit(e)">Edit</button>
            <button class="btn-danger" (click)="delete(e.id)">Delete</button>
        </div>
    </div>
</div>
