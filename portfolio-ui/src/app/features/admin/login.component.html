<div class="admin-wrapper" style="align-items: center; justify-content: center;">
    <div class="admin-form" style="max-width: 400px; width: 100%; margin: 0 20px;">
        <h2 style="font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 24px; color: #fff;">Admin Login</h2>
        
        <div>
            <label>Email Address</label>
            <input [(ngModel)]="email" placeholder="admin@example.com" type="email">
        </div>
        
        <div style="margin-top: 16px;">
            <label>Password</label>
            <input [(ngModel)]="password" type="password" placeholder="••••••••">
        </div>
        
        <button class="btn-primary" (click)="login()" style="width: 100%; margin-top: 24px;">
            Secure Login
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
        </button>
    </div>
</div>
