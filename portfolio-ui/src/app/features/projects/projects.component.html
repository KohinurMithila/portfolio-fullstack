<div class="projects-container">
    <div class="projects-header">
        <h2 class="section-title">Featured Projects</h2>
    </div>

    <div class="projects-grid">
        <div class="project-card" *ngFor="let p of projects">
            <div class="project-img-wrapper" *ngIf="p.imageUrl">
                <img [src]="p.imageUrl" alt="{{p.title}}">
            </div>
            
            <div class="project-content">
                <h3 class="project-title">{{p.title}}</h3>
                <p class="project-desc">{{p.description}}</p>
                <p class="project-tech" *ngIf="p.techStack"><strong style="color: var(--primary)">Tech:</strong> {{p.techStack}}</p>
                
                <div class="project-actions">
                    <a *ngIf="p.liveLink" [href]="p.liveLink" target="_blank" class="btn-primary" style="text-decoration: none; font-size: 14px; padding: 8px 16px;">Live Demo</a>
                    <a *ngIf="p.githubLink" [href]="p.githubLink" target="_blank" class="btn-secondary" style="text-decoration: none; font-size: 14px; padding: 8px 16px;">GitHub</a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .projects-container {
        max-width: 1200px;
        margin: 0 auto;
    }
    
    .projects-header {
        text-align: center;
        margin-bottom: 40px;
    }
    
    .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 30px;
    }

    .project-card {
        background: var(--bg-card);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        backdrop-filter: blur(10px);
    }

    .project-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        border-color: rgba(99, 102, 241, 0.3);
    }

    .project-img-wrapper {
        width: 100%;
        height: 200px;
        overflow: hidden;
    }

    .project-img-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
    }

    .project-card:hover .project-img-wrapper img {
        transform: scale(1.05);
    }

    .project-content {
        padding: 24px;
        display: flex;
        flex-direction: column;
        flex-grow: 1;
    }

    .project-title {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 12px;
        color: var(--text-main);
    }

    .project-desc {
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 16px;
        flex-grow: 1;
    }

    .project-tech {
        font-size: 14px;
        color: var(--text-muted);
        margin-bottom: 20px;
        background: rgba(15, 23, 42, 0.4);
        padding: 8px 12px;
        border-radius: 8px;
    }

    :global(body.light-theme) .project-tech {
        background: rgba(0, 0, 0, 0.04);
    }

    .project-actions {
        display: flex;
        gap: 12px;
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: white;
        border-radius: 8px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        display: inline-block;
        font-weight: 600;
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
    }

    .btn-secondary {
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-main);
        border-radius: 8px;
        transition: all 0.3s ease;
        display: inline-block;
        font-weight: 600;
    }
    
    :global(body.light-theme) .btn-secondary {
        background: rgba(0, 0, 0, 0.04);
        border-color: rgba(0, 0, 0, 0.1);
    }

    .btn-secondary:hover {
        transform: translateY(-2px);
        background: rgba(15, 23, 42, 0.6);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }
    
    :global(body.light-theme) .btn-secondary:hover {
        background: rgba(0, 0, 0, 0.08);
    }
</style>
