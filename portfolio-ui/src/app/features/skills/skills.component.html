<div class="skills-container">
    <div class="skills-header">
        <h2 class="section-title">Skills</h2>
    </div>

    <div class="skills-grid">
        <div class="skill-card" *ngFor="let s of skills">
            <div class="skill-info">
                <div class="skill-name-wrapper">
                    <img *ngIf="s.icon" [src]="s.icon" class="skill-icon" alt="{{s.name}} icon">
                    <div *ngIf="!s.icon" class="skill-dot"></div>
                    <span class="skill-name">{{s.name}}</span>
                </div>
                <span class="skill-level">{{s.level}}%</span>
            </div>

            <div class="progress-bg">
                <div class="progress-fill" [style.width.%]="s.level"></div>
            </div>
        </div>
    </div>
</div>

<style>
    .skills-container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px 0;
    }

    .skills-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .section-title {
        font-size: 36px;
        font-weight: 700;
        margin-bottom: 10px;
        color: var(--text-main);
    }

    .section-subtitle {
        color: var(--text-muted);
        font-size: 16px;
        max-width: 600px;
        margin: 0 auto;
    }

    .skills-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 24px;
    }

    .skill-card {
        background: var(--bg-card);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 24px;
        backdrop-filter: blur(10px);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .skill-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        border-color: rgba(99, 102, 241, 0.3); /* subtle primary color border on hover */
    }

    .skill-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
    }

    .skill-name-wrapper {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .skill-icon {
        width: 28px;
        height: 28px;
        object-fit: contain;
    }

    .skill-dot {
        width: 10px;
        height: 10px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        border-radius: 50%;
        box-shadow: 0 0 10px var(--primary);
    }

    .skill-name {
        font-size: 18px;
        font-weight: 600;
        color: var(--text-main);
    }

    .skill-level {
        font-size: 16px;
        font-weight: 700;
        color: var(--primary);
    }

    .progress-bg {
        width: 100%;
        height: 8px;
        background: rgba(15, 23, 42, 0.4);
        border-radius: 10px;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--primary), var(--accent));
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        transition: width 1s ease-in-out;
    }
</style>
