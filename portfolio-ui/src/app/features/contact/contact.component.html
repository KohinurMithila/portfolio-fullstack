<div class="contact-container">
    <div class="contact-header">
        <h2 class="section-title">Contact</h2>
    </div>

    <div class="contact-grid">
        <div class="contact-info">
            <a class="info-card" *ngIf="about?.email" [href]="'mailto:' + about.email" style="text-decoration: none; color: inherit;">
                <div class="icon-circle"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg></div>
                <div>
                    <h4>Email</h4>
                    <p style="color: var(--primary);">{{about.email}}</p>
                </div>
            </a>
            
            <a class="info-card" *ngIf="about?.whatsapp" [href]="'https://wa.me/' + about.whatsapp" target="_blank" style="text-decoration: none; color: inherit;">
                <div class="icon-circle"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg></div>
                <div>
                    <h4>WhatsApp</h4>
                    <p style="color: var(--primary);">{{about.whatsapp}}</p>
                </div>
            </a>
            
            <div class="info-card" *ngIf="about?.address">
                <div class="icon-circle"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg></div>
                <div>
                    <h4>Address</h4>
                    <p>{{about.address}}</p>
                </div>
            </div>

            <a class="info-card" *ngIf="about?.linkedInUrl" [href]="about.linkedInUrl" target="_blank" style="text-decoration: none;">
                <div class="icon-circle"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg></div>
                <div>
                    <h4>LinkedIn</h4>
                    <p style="color: var(--primary);">Connect with me</p>
                </div>
            </a>

            <a class="info-card" *ngIf="about?.githubUrl" [href]="about.githubUrl" target="_blank" style="text-decoration: none;">
                <div class="icon-circle"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg></div>
                <div>
                    <h4>GitHub</h4>
                    <p style="color: var(--primary);">View my code</p>
                </div>
            </a>

            <div class="info-card" *ngIf="about?.contactDetails && !about?.email && !about?.whatsapp && !about?.address">
                <div class="icon-circle"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg></div>
                <div>
                    <h4>Other Info</h4>
                    <p>{{about.contactDetails}}</p>
                </div>
            </div>
        </div>

        <form class="glass-card contact-form">
            <div class="form-group">
                <label>Name</label>
                <input [(ngModel)]="contactName" name="name" placeholder="Your Name" class="form-input" required>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input [(ngModel)]="contactEmail" name="email" placeholder="your.email@example.com" type="email" class="form-input">
            </div>
            
            <div class="form-group" style="grid-column: 1 / -1;">
                <label>Message</label>
                <textarea [(ngModel)]="contactMessage" name="message" placeholder="Write your message here..." class="form-input" rows="5" required></textarea>
            </div>

            <div style="grid-column: 1 / -1; position: relative;">
                <button class="btn-submit" type="button" (click)="triggerOptions()" style="width: 100%;">
                    Send Message
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>

                <div class="send-options-dropdown" *ngIf="showOptions">
                    <button type="button" class="option-btn wa-btn" (click)="sendVia('whatsapp')" *ngIf="about?.whatsapp">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                        Send via WhatsApp
                    </button>
                    <button type="button" class="option-btn email-btn" (click)="sendVia('email')" *ngIf="about?.email">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        Send via Email
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<style>
    .contact-container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 40px 0;
    }

    .contact-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .section-title {
        font-size: 36px;
        font-weight: 700;
        margin-bottom: 10px;
        color: var(--text-main);
    }

    .contact-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 50px;
        align-items: center;
    }

    .contact-info {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .info-card {
        display: flex;
        align-items: center;
        gap: 16px;
        background: rgba(15, 23, 42, 0.4);
        padding: 16px 20px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .info-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        border-color: rgba(99, 102, 241, 0.3);
    }

    .icon-circle {
        width: 46px;
        height: 46px;
        background: rgba(99, 102, 241, 0.1);
        color: var(--primary);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .info-card h4 {
        margin: 0 0 5px 0;
        font-size: 16px;
        color: var(--text-main);
    }

    .info-card p {
        margin: 0;
        font-size: 14px;
        color: var(--text-muted);
        line-height: 1.5;
    }

    :global(body.light-theme) .info-card {
        background: rgba(0, 0, 0, 0.02);
    }

    .contact-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 40px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .contact-form:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        border-color: rgba(99, 102, 241, 0.3);
    }

    @media(max-width: 800px) {
        .contact-grid {
            grid-template-columns: 1fr;
        }
    }

    @media(max-width: 600px) {
        .contact-form {
            padding: 24px;
        }
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .form-group label {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-muted);
    }

    .form-input {
        width: 100%;
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-main);
        padding: 14px 16px;
        border-radius: 12px;
        font-family: inherit;
        font-size: 15px;
        transition: all 0.3s;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        background: rgba(15, 23, 42, 0.6);
    }

    /* Light theme overrides for form inputs */
    :global(body.light-theme) .form-input {
        background: rgba(0, 0, 0, 0.03);
    }
    :global(body.light-theme) .form-input:focus {
        background: #fff;
    }

    .btn-submit {
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: white;
        border: none;
        padding: 14px 24px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(99, 102, 241, 0.5);
    }

    .send-options-dropdown {
        position: absolute;
        bottom: 100%;
        left: 0;
        right: 0;
        margin-bottom: 10px;
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        z-index: 10;
        animation: slideUp 0.3s ease forwards;
    }

    :global(body.light-theme) .send-options-dropdown {
        background: #fff;
        border: 1px solid rgba(0,0,0,0.1);
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .option-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
        color: white;
    }

    .wa-btn {
        background: #25D366;
    }

    .wa-btn:hover {
        background: #128C7E;
    }

    .email-btn {
        background: #EA4335;
    }

    .email-btn:hover {
        background: #D93025;
    }
</style>
